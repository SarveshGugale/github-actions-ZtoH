name: Docker Build Push

on: 
    push:
        branches: [main]

jobs:  
 build-and-push:
    runs-on: ubuntu-latest

    steps:
        - name: code checkout
          uses: actions/checkout@v4
        
        - name: Login to docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}