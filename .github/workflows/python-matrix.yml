name:

on:
    push:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
              python-version: [3.9,3.12,3.13,3.14]


        steps:
         - name: Checkout code 
           uses: actions/checkout@v4

         - name: Setup Python
           uses: actions/setup-python@v4
           with: 
             python-version: ${{ matrix.python-version }}

         - name: Install- dependencies
           run:  pip install -r requriments.txt

         - name: run linter
           run: flake8 app.py

           

          

